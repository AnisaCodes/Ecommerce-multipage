<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shop - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>TechGear</h1>
        <div>
            <a href="index.html">Shop</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </div>
    </nav>

    <main class="product-grid">
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Headphones">
            <h3>Wireless Headphones</h3>
            <p>$99.00</p>
            <button onclick="addToCart('Wireless Headphones', 99)">Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Smartwatch">
            <h3>Smartwatch</h3>
            <p>$149.00</p>
            <button onclick="addToCart('Smartwatch', 149)">Add to Cart</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
